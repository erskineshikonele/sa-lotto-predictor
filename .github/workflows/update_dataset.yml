# ─────────────────────────────────────────────────────────────────
# SA Lotto Predictor — Auto-Update Workflow
# Author: Erskine Brister Shikonele · Computer Systems Engineer
#
# Runs automatically every Wednesday and Saturday at 23:00 SAST
# (21:00 UTC) — 2 hours after the draw to ensure results are live.
#
# Can also be triggered manually from the Actions tab on GitHub.
# ─────────────────────────────────────────────────────────────────

name: Auto-Update Lotto Dataset

on:
  schedule:
    # Wednesday 23:00 SAST = 21:00 UTC
    - cron: '0 21 * * 3'
    # Saturday 23:00 SAST = 21:00 UTC
    - cron: '0 21 * * 6'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    # Only run on the main branch
    if: github.ref == 'refs/heads/main'

    steps:

      # 1. Check out the full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4

      # 4. Run the auto-update pipeline
      - name: Run auto-update pipeline
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python lotto_pipeline.py --auto-update

      # 5. Commit and push if anything changed
      - name: Commit and push updates
        shell: bash
        run: |
          git config user.name  "Erskine Brister Shikonele"
          git config user.email "actions@github.com"

          # Stage updated files
          git add -A

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No new draw found - nothing to commit."
          else
            DRAW_DATE=$(date -u +"%Y-%m-%d")
            git commit -m "Auto-update: new draw added ${DRAW_DATE} [skip ci]"

            # Pull any changes that landed on main since checkout,
            # rebasing our commit on top to avoid push conflicts
            git pull --rebase origin main

            # Retry push up to 3 times in case of further races
            PUSHED=0
            for i in 1 2 3; do
              if git push origin main; then
                echo "Changes pushed successfully."
                PUSHED=1
                break
              else
                echo "Push attempt $i failed, pulling and retrying..."
                git pull --rebase origin main
                sleep 3
              fi
            done

            if [ "$PUSHED" -eq 0 ]; then
              echo "All push attempts failed."
              exit 1
            fi
          fi
